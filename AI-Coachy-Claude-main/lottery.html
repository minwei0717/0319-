<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 雨林探險隊 - LINE@ 好友募集抽獎趣</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #CFF0EA 0%, #E2F2CE 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        /* 背景爬寵裝飾 */
        .bg-deco {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .bg-deco span {
            position: absolute;
            opacity: 0.50;
            animation: floatDeco 6s ease-in-out infinite;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
        }

        @keyframes floatDeco {
            0%, 100% { transform: translateY(0) rotate(-6deg); }
            50%      { transform: translateY(-18px) rotate(6deg); }
        }

        h1 {
            color: #0F857C;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        .logo {
            width: 180px;
            margin-bottom: 20px;
        }

        .subtitle {
            color: #5E8A45;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        /* 抽獎箱 */
        .lottery-box {
            width: 300px;
            height: 300px;
            margin: 0 auto 40px;
            background: linear-gradient(145deg, #12A89F, #5FB539);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .lottery-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, rgba(255,255,255,0.1), transparent 30%);
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .prize-display {
            position: relative;
            z-index: 1;
            font-size: 1.8rem;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .prize-display .emoji {
            font-size: 5rem;
            display: block;
            margin-bottom: 10px;
        }

        /* 抽獎動畫 */
        .lottery-box.drawing {
            animation: shake 0.3s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            25% { transform: translateX(-8px) rotate(-3deg); }
            75% { transform: translateX(8px) rotate(3deg); }
        }

        /* 中獎動畫 */
        .lottery-box.won {
            animation: celebrate 0.6s ease-out;
        }

        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* 按鈕 */
        .draw-btn {
            padding: 18px 60px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #14B8AD;
            background: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            transition: all 0.3s;
            font-family: 'Microsoft JhengHei', sans-serif;
        }

        .draw-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .draw-btn:active {
            transform: translateY(0);
        }

        .draw-btn:disabled {
            background: #ccc;
            color: #999;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 剩餘數量 */
        .stock-panel {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .stock-item {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: #136B63;
            min-width: 140px;
        }

        .stock-item .name {
            font-size: 1rem;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .stock-item .count {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stock-item .count.zero {
            color: #ff6b6b;
        }

        /* 總數 */
        .total-info {
            color: #5a7d52;
            margin-top: 25px;
            font-size: 0.95rem;
        }

        /* 彩帶效果 */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 1000;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                top: 110vh;
                transform: rotate(720deg);
            }
        }
    </style>
</head>
<body>
    <div class="bg-deco" aria-hidden="true">
        <span style="top:8%;left:6%;font-size:3.5rem;animation-delay:0s">🦎</span>
        <span style="top:15%;left:84%;font-size:3rem;animation-delay:1.2s">🐸</span>
        <span style="top:72%;left:8%;font-size:3.2rem;animation-delay:.6s">🦀</span>
        <span style="top:80%;left:86%;font-size:3.4rem;animation-delay:2s">🦎</span>
        <span style="top:42%;left:4%;font-size:2.6rem;animation-delay:1.8s">🐍</span>
        <span style="top:48%;left:93%;font-size:2.8rem;animation-delay:.9s">🦂</span>
        <span style="top:90%;left:40%;font-size:3rem;animation-delay:1.5s">🐢</span>
        <span style="top:4%;left:40%;font-size:2.6rem;animation-delay:2.4s">🐸</span>
        <span style="top:62%;left:75%;font-size:2.4rem;animation-delay:.3s">🦗</span>
        <span style="top:24%;left:18%;font-size:2.4rem;animation-delay:1.1s">🦀</span>
        <span style="top:10%;left:70%;font-size:2.8rem;animation-delay:.7s">🐍</span>
        <span style="top:86%;left:22%;font-size:2.6rem;animation-delay:2.1s">🐍</span>
        <span style="top:30%;left:88%;font-size:3rem;animation-delay:1.4s">🐢</span>
        <span style="top:58%;left:6%;font-size:2.8rem;animation-delay:.4s">🐢</span>
    </div>

    <div class="container">
        <img src="logo.png" alt="zero zero" class="logo">
        <h1>2026 雨林探險隊</h1>
        <p class="subtitle">LINE@ 好友募集抽獎趣</p>

        <div class="lottery-box" id="lotteryBox">
            <div class="prize-display" id="prizeDisplay">
                <span class="emoji">🎁</span>
                <span id="prizeText">點擊下方抽獎</span>
            </div>
        </div>

        <button class="draw-btn" id="drawBtn" onclick="draw()">開始抽獎</button>

        <div class="stock-panel">
            <div class="stock-item">
                <div class="name">🎟️ 剩餘抽獎次數</div>
                <div class="count" id="drawsCount">200</div>
            </div>
            <div class="stock-item">
                <div class="name">🛍️ 永續造型袋（剩餘）</div>
                <div class="count" id="bagCount">5</div>
            </div>
        </div>

        <p class="total-info">已抽出：<strong id="usedCount">0</strong> / 200</p>
    </div>

    <script>
        // 抽獎設定：共 200 次抽獎，其中 5 次會中「永續造型袋」，其餘銘謝惠顧
        const TOTAL_DRAWS = 200;   // 總抽獎次數
        const TOTAL_BAGS  = 5;     // 中獎名額（袋子數量）
        const prize = { name: 'zero zero 永續造型袋（款式隨機）', emoji: '🛍️' };

        let drawsLeft = TOTAL_DRAWS;   // 剩餘抽獎次數
        let bagsLeft  = TOTAL_BAGS;    // 剩餘可中袋子
        let isDrawing = false;

        function updateUI() {
            document.getElementById('drawsCount').textContent = drawsLeft;
            document.getElementById('bagCount').textContent = bagsLeft;
            document.getElementById('usedCount').textContent = TOTAL_DRAWS - drawsLeft;

            document.getElementById('bagCount').classList.toggle('zero', bagsLeft === 0);
            document.getElementById('drawsCount').classList.toggle('zero', drawsLeft === 0);

            // 全部抽完時停用按鈕
            if (drawsLeft === 0) {
                document.getElementById('drawBtn').disabled = true;
                document.getElementById('drawBtn').textContent = '已全部抽完！';
            }
        }

        // 回傳 true=中袋子、false=銘謝惠顧
        function drawPrize() {
            if (drawsLeft === 0) return null;

            // 機率 = 剩餘袋子 / 剩餘次數，確保整場剛好 5 個中獎
            const win = Math.random() * drawsLeft < bagsLeft;
            drawsLeft--;
            if (win) {
                bagsLeft--;
                return true;
            }
            return false;
        }

        function createConfetti() {
            const colors = ['#19C7BD', '#8CD05A', '#0FB9AE', '#6FC23F', '#ffffff', '#ffd93d'];
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.width = (Math.random() * 8 + 6) + 'px';
                confetti.style.height = (Math.random() * 8 + 6) + 'px';
                confetti.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                confetti.style.animationDelay = (Math.random() * 0.5) + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }
        }

        function draw() {
            if (isDrawing || drawsLeft === 0) return;
            isDrawing = true;

            const box = document.getElementById('lotteryBox');
            const display = document.getElementById('prizeDisplay');
            const btn = document.getElementById('drawBtn');

            btn.disabled = true;
            box.classList.add('drawing');
            box.classList.remove('won');

            // 抽獎動畫：快速切換顯示
            const emojis = ['🛍️', '🎁', '✨', '🎉', '♻️'];
            let tick = 0;
            const interval = setInterval(() => {
                const e = emojis[tick % emojis.length];
                display.innerHTML = `<span class="emoji">${e}</span><span>抽獎中...</span>`;
                tick++;
            }, 100);

            // 1.5 秒後顯示結果
            setTimeout(() => {
                clearInterval(interval);
                box.classList.remove('drawing');
                box.classList.add('won');

                const result = drawPrize();
                if (result === true) {
                    display.innerHTML = `<span class="emoji">${prize.emoji}</span><span>恭喜獲得<br>${prize.name}！</span>`;
                    createConfetti();
                } else {
                    box.classList.remove('won');
                    display.innerHTML = `<span class="emoji">😊</span><span>銘謝惠顧<br>謝謝參加！</span>`;
                }

                updateUI();
                btn.disabled = false;
                isDrawing = false;
            }, 1500);
        }

        // 初始化
        updateUI();
    </script>
</body>
</html>
