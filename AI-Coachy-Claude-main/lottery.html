<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 VOGUE野餐日 - zero zero 永續野釣手！抽獎趣</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #2ec4b6 0%, #7bc67e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .logo {
            width: 180px;
            margin-bottom: 20px;
            filter: brightness(0) invert(1);
        }

        .subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        /* 抽獎箱 */
        .lottery-box {
            width: 300px;
            height: 300px;
            margin: 0 auto 40px;
            background: linear-gradient(145deg, #ffcc02, #ff9500);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .lottery-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, rgba(255,255,255,0.1), transparent 30%);
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .prize-display {
            position: relative;
            z-index: 1;
            font-size: 1.8rem;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .prize-display .emoji {
            font-size: 5rem;
            display: block;
            margin-bottom: 10px;
        }

        /* 抽獎動畫 */
        .lottery-box.drawing {
            animation: shake 0.3s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            25% { transform: translateX(-8px) rotate(-3deg); }
            75% { transform: translateX(8px) rotate(3deg); }
        }

        /* 中獎動畫 */
        .lottery-box.won {
            animation: celebrate 0.6s ease-out;
        }

        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* 按鈕 */
        .draw-btn {
            padding: 18px 60px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #2ec4b6;
            background: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            transition: all 0.3s;
            font-family: 'Microsoft JhengHei', sans-serif;
        }

        .draw-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .draw-btn:active {
            transform: translateY(0);
        }

        .draw-btn:disabled {
            background: #ccc;
            color: #999;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 剩餘數量 */
        .stock-panel {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .stock-item {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: #fff;
            min-width: 140px;
        }

        .stock-item .name {
            font-size: 1rem;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .stock-item .count {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stock-item .count.zero {
            color: #ff6b6b;
        }

        /* 總數 */
        .total-info {
            color: rgba(255,255,255,0.7);
            margin-top: 25px;
            font-size: 0.95rem;
        }

        /* 彩帶效果 */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 1000;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                top: 110vh;
                transform: rotate(720deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="zero zero" class="logo">
        <h1>2026 VOGUE野餐日</h1>
        <p class="subtitle">zero zero 永續野釣手！抽獎趣</p>

        <div class="lottery-box" id="lotteryBox">
            <div class="prize-display" id="prizeDisplay">
                <span class="emoji">🎁</span>
                <span id="prizeText">點擊下方抽獎</span>
            </div>
        </div>

        <button class="draw-btn" id="drawBtn" onclick="draw()">開始抽獎</button>

        <div class="stock-panel">
            <div class="stock-item">
                <div class="name">📓 筆記本</div>
                <div class="count" id="notebookCount">100</div>
            </div>
            <div class="stock-item">
                <div class="name">🖊️ 原子筆</div>
                <div class="count" id="penCount">200</div>
            </div>
            <div class="stock-item">
                <div class="name">🖋️ 筆筒</div>
                <div class="count" id="holderCount">200</div>
            </div>
        </div>

        <p class="total-info">剩餘總數：<strong id="totalCount">500</strong> / 500</p>
    </div>

    <script>
        // 獎品庫存
        const prizes = {
            notebook: { name: '筆記本', emoji: '📓', stock: 100 },
            pen:      { name: '原子筆', emoji: '🖊️', stock: 200 },
            holder:   { name: '筆筒',   emoji: '🖋️', stock: 200 }
        };

        let isDrawing = false;

        function getTotal() {
            return prizes.notebook.stock + prizes.pen.stock + prizes.holder.stock;
        }

        function updateUI() {
            document.getElementById('notebookCount').textContent = prizes.notebook.stock;
            document.getElementById('penCount').textContent = prizes.pen.stock;
            document.getElementById('holderCount').textContent = prizes.holder.stock;
            document.getElementById('totalCount').textContent = getTotal();

            // 數量為 0 時變紅
            ['notebookCount', 'penCount', 'holderCount'].forEach((id, i) => {
                const el = document.getElementById(id);
                const stock = [prizes.notebook.stock, prizes.pen.stock, prizes.holder.stock][i];
                el.classList.toggle('zero', stock === 0);
            });

            // 全部抽完時停用按鈕
            if (getTotal() === 0) {
                document.getElementById('drawBtn').disabled = true;
                document.getElementById('drawBtn').textContent = '已全部抽完！';
            }
        }

        function drawPrize() {
            const total = getTotal();
            if (total === 0) return null;

            // 依照剩餘數量隨機抽取
            const rand = Math.floor(Math.random() * total);
            let cumulative = 0;

            for (const key in prizes) {
                cumulative += prizes[key].stock;
                if (rand < cumulative) {
                    prizes[key].stock--;
                    return prizes[key];
                }
            }
            return null;
        }

        function createConfetti() {
            const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bff', '#ff9500'];
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.width = (Math.random() * 8 + 6) + 'px';
                confetti.style.height = (Math.random() * 8 + 6) + 'px';
                confetti.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                confetti.style.animationDelay = (Math.random() * 0.5) + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }
        }

        function draw() {
            if (isDrawing || getTotal() === 0) return;
            isDrawing = true;

            const box = document.getElementById('lotteryBox');
            const display = document.getElementById('prizeDisplay');
            const btn = document.getElementById('drawBtn');

            btn.disabled = true;
            box.classList.add('drawing');
            box.classList.remove('won');

            // 抽獎動畫：快速切換顯示
            const emojis = ['📓', '🖊️', '🖋️', '🎁', '✨', '🎉'];
            let tick = 0;
            const interval = setInterval(() => {
                const e = emojis[tick % emojis.length];
                display.innerHTML = `<span class="emoji">${e}</span><span>抽獎中...</span>`;
                tick++;
            }, 100);

            // 1.5 秒後顯示結果
            setTimeout(() => {
                clearInterval(interval);
                box.classList.remove('drawing');
                box.classList.add('won');

                const result = drawPrize();
                if (result) {
                    display.innerHTML = `<span class="emoji">${result.emoji}</span><span>恭喜獲得<br>${result.name}！</span>`;
                    createConfetti();
                }

                updateUI();
                btn.disabled = false;
                isDrawing = false;
            }, 1500);
        }

        // 初始化
        updateUI();
    </script>
</body>
</html>
